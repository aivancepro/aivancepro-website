<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="64x64" href="../assets/favicon-64.png">
    <link rel="icon" type="image/png" sizes="48x48" href="../assets/favicon-48.png">
    <title>Anmelden - AIVancePro</title>
    <meta name="description" content="Melden Sie sich bei Ihrem AIVancePro-Konto an, um Ihr Premium-Abonnement zu verwalten.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --blue: #2563EB; --purple: #9333EA; --gray-900: #111827; --gray-700: #374151; --gray-500: #6B7280; --gray-400: #9CA3AF; --gray-200: #E5E7EB; --gray-50: #F9FAFB; --white: #FFFFFF; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--gray-50); color: var(--gray-900); line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
        nav { padding: 1rem 2rem; display: flex; justify-content: center; }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--gray-900); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .logo img { width: 34px; height: 34px; border-radius: 8px; }
        .logo-text { background: linear-gradient(135deg, var(--blue), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .login-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .login-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: 20px; padding: 3rem; width: 100%; max-width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .login-card h1 { font-size: 1.6rem; font-weight: 800; text-align: center; margin-bottom: 0.5rem; }
        .login-card .subtitle { text-align: center; color: var(--gray-500); font-size: 0.9rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--gray-700); margin-bottom: 0.4rem; }
        .form-group input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--gray-200); border-radius: 10px; font-size: 0.95rem; font-family: inherit; color: var(--gray-900); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        .form-group input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .form-group input::placeholder { color: var(--gray-400); }
        .btn-login { width: 100%; padding: 0.875rem; background: linear-gradient(135deg, var(--blue), var(--purple)); color: var(--white); border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; box-shadow: 0 4px 15px rgba(37,99,235,0.25); }
        .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--gray-400); font-size: 0.8rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
        .social-login { display: flex; flex-direction: column; gap: 0.75rem; }
        .btn-social { width: 100%; padding: 0.75rem; background: var(--white); color: var(--gray-700); border: 1px solid var(--gray-200); border-radius: 10px; font-size: 0.9rem; font-weight: 600; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-social svg { width: 20px; height: 20px; }
        .info-banner { background: linear-gradient(135deg, rgba(37,99,235,0.05), rgba(147,51,234,0.05)); border: 1px solid rgba(37,99,235,0.15); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--gray-700); line-height: 1.5; }
        .info-banner strong { color: var(--blue); }
        .login-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--gray-500); }
        .login-footer a { color: var(--blue); text-decoration: none; font-weight: 600; }
        .back-link { text-align: center; margin-top: 2rem; }
        .back-link a { color: var(--gray-500); text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav><a href="/de/" class="logo"><img src="../assets/logo.png" alt="AIVancePro"><span class="logo-text">AIVancePro</span></a></nav>
    <div class="login-container">
        <div class="login-card">
            <h1>Anmelden</h1>
            <p class="subtitle">Zugang zu Ihrem AIVancePro-Konto</p>
            <div class="info-banner"><strong>Web-Premium-Abonnement</strong><br>Melden Sie sich an, um Ihr Abonnement zu verwalten. Ihr Premium-Status wird automatisch mit der App synchronisiert.</div>
            <form onsubmit="return false;">
                <div class="form-group"><label for="email">E-Mail-Adresse</label><input type="email" id="email" placeholder="sie@beispiel.de" required></div>
                <div class="form-group"><label for="password">Passwort</label><input type="password" id="password" placeholder="Ihr Passwort" required></div>
                <button type="submit" class="btn-login">Anmelden</button>
            </form>
            <div class="divider">oder</div>
            <div class="social-login">
                <button class="btn-social" type="button"><svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Weiter mit Google</button>
                <button class="btn-social" type="button"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>Weiter mit Apple</button>
            </div>
            <div class="login-footer">Noch kein Konto? <a href="https://apps.apple.com/app/aivancepro/id6756116760" target="_blank" rel="noopener">App herunterladen</a></div>
            <div class="back-link"><a href="/de/">&larr; Zur&uuml;ck zur Startseite</a></div>
        </div>
    </div>
</body>
</html>
